# Variant focused on the "run-together" pronunciation: Heybubba / HeyBubba.
# Used to generate an additional batch of positives.

wakeword:
  phrase: "Heybubba"
  variants:
    - "Heybubba"
    - "heybubba"
    - "HeyBubba"
    - "Hey-Bubba"
    - "Heybubbah"
    - "Heybuba"
    - "Heybubbuh"
    - "Heybuba"

audio:
  sample_rate: 16000
  window_seconds: 1.96
  hop_seconds: 0.10

features:
  type: log_mel
  n_fft: 512
  win_length_ms: 25
  hop_length_ms: 10
  n_mels: 40
  fmin: 20
  fmax: 7600
  log_offset: 1.0e-6
  per_utt_normalize: true

model:
  name: owww
  num_classes: 2
  n_emb: 15
  emb_dim: 96
  hidden: 128
  dropout: 0.2
  tau: 0

train:
  seed: 1337
  epochs: 40
  batch_size: 256
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-4
  warmup_epochs: 3
  scheduler: cosine
  amp: false
  ema_decay: 0.999
  label_smoothing: 0.05
  positive_ratio: 0.25
  hard_negative_ratio: 0.25
  loss: bce
  focal_gamma: 2.0
  augment:
    pitch_shift_semitones: [0, 0]
    time_stretch_pct: [0, 0]
    gain_db: [-12, 6]
    noise_snr_db: [-10, 25]
    noise_prob: 0.9
    rir_prob: 0.4
    bandpass_prob: 0.30
    codec_prob: 0.25
    compress_prob: 0.40
    shelf_eq_prob: 0.30
    spec_time_mask: 25
    spec_freq_mask: 7
    spec_n_masks: 2

data:
  positives_dir: data/positives_heybubba
  negatives_dir: data/negatives
  noise_dir: data/noise
  rirs_dir: data/rirs
  manifest_dir: data/manifests_heybubba
  val_fraction: 0.10
  test_fraction: 0.10

eval:
  threshold_sweep: [0.05, 0.99, 0.01]
  target_far_per_hour: 0.5

export:
  onnx_opset: 18
  quantize_int8: true
  representative_samples: 256
